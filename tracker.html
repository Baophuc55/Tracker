<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Task Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet"/>
<style>
:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --surface2: #F0EEE8;
  --border: #E2DED5;
  --border2: #C8C4BB;
  --text: #1A1916;
  --text2: #6B6860;
  --text3: #A8A49C;
  --hr-bg: #EEEDFE; --hr-txt: #3C3489; --hr-dot: #7F77DD;
  --mkt-bg: #E1F5EE; --mkt-txt: #085041; --mkt-dot: #1D9E75;
  --lm-bg: #FBEAF0; --lm-txt: #72243E; --lm-dot: #D4537E;
  --bd-bg: #E6F1FB; --bd-txt: #0C447C; --bd-dot: #378ADD;
  --ok: #1D9E75; --ok-bg: #E1F5EE;
  --warn: #BA7517; --warn-bg: #FAEEDA;
  --danger: #A32D2D; --danger-bg: #FCEBEB;
  --radius: 10px; --radius-sm: 6px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
[data-theme="dark"] {
  --bg: #16150F; --surface: #1E1D16; --surface2: #2A2820;
  --border: #2E2C22; --border2: #48463A;
  --text: #F0EDE4; --text2: #8C8980; --text3: #5A5850;
  --hr-bg: #26215C; --hr-txt: #CECBF6; --hr-dot: #7F77DD;
  --mkt-bg: #04342C; --mkt-txt: #9FE1CB; --mkt-dot: #1D9E75;
  --lm-bg: #4B1528; --lm-txt: #F4C0D1; --lm-dot: #D4537E;
  --bd-bg: #042C53; --bd-txt: #B5D4F4; --bd-dot: #378ADD;
  --ok-bg: #04342C; --warn-bg: #412402; --danger-bg: #501313;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;transition:background .2s,color .2s}
input,select,textarea,button{font-family:var(--font);font-size:14px}

/* Layout */
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:2rem;max-width:780px}

/* Sidebar */
.logo{font-size:16px;font-weight:500;color:var(--text);padding:.5rem .75rem 1.25rem;letter-spacing:-.01em}
.logo span{color:var(--text3);font-weight:300}
.nav-item{display:flex;align-items:center;gap:9px;padding:.55rem .75rem;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left;transition:background .15s,color .15s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--text);color:var(--bg)}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:.75rem .75rem .25rem;margin-top:.5rem}
.sidebar-bottom{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
.theme-btn{display:flex;align-items:center;gap:9px;padding:.55rem .75rem;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;transition:background .15s}
.theme-btn:hover{background:var(--surface2);color:var(--text)}

/* Header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:500;letter-spacing:-.02em}
.date-nav{display:flex;align-items:center;gap:8px}
.date-label{font-size:14px;font-family:var(--mono);color:var(--text2)}
.btn-icon{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s}
.btn-icon:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;color:var(--text2);font-size:13px;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.btn-primary{background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);padding:7px 16px;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.btn-primary:hover{opacity:.85}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem}
.stat-num{font-size:24px;font-weight:500;font-family:var(--mono);letter-spacing:-.02em}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

/* Legend */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* Daily slots */
.period-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:1rem 0 4px 52px}
.time-row{display:flex;gap:8px;align-items:stretch;margin-bottom:2px}
.time-col{width:44px;font-size:11px;color:var(--text3);padding-top:9px;text-align:right;font-family:var(--mono);flex-shrink:0}
.slot{flex:1;min-height:38px;border-radius:var(--radius-sm);padding:7px 10px;display:flex;align-items:center;gap:7px;border:1px solid transparent;transition:opacity .15s}
.slot:hover{opacity:.88}
.slot-name{font-size:13px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-done .slot-name{text-decoration:line-through;opacity:.45}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;flex-shrink:0;white-space:nowrap}
.dl-ok{background:var(--ok-bg);color:var(--ok)}
.dl-soon{background:var(--warn-bg);color:var(--warn)}
.dl-over{background:var(--danger-bg);color:var(--danger)}
.dur-label{font-size:11px;opacity:.55;flex-shrink:0;font-family:var(--mono)}
.sep{border:none;border-top:1px solid var(--border);margin:6px 0 6px 52px}
.add-slot-row{margin-left:52px}
.add-slot{background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);height:36px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--text3);cursor:pointer;width:100%;transition:all .15s}
.add-slot:hover{border-color:var(--border2);color:var(--text2);background:var(--surface2)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px}
.empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.4}

/* Projects */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.filter-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.proj-list{display:flex;flex-direction:column;gap:8px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
.proj-card:hover{border-color:var(--border2)}
.proj-top{display:flex;align-items:flex-start;gap:10px}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-desc{font-size:12px;color:var(--text2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.proj-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.proj-fill{height:100%;border-radius:2px;transition:width .4s}
.proj-foot{display:flex;align-items:center;justify-content:space-between}
.proj-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.proj-actions{display:flex;gap:4px}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:380px;max-width:calc(100vw - 2rem);max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1.25rem}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--border2)}
.form-group textarea{height:70px;resize:vertical}
.cat-row{display:flex;gap:6px;flex-wrap:wrap}
.cat-opt{padding:5px 12px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;font-size:12px;font-weight:500;background:var(--surface2);color:var(--text2);transition:all .15s}
.cat-opt.sel{border-color:currentColor}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-row input[type=range]{flex:1}
.prog-val{font-size:13px;font-family:var(--mono);color:var(--text2);min-width:36px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.delete-btn{margin-right:auto;background:none;border:1px solid var(--danger-bg);border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;color:var(--danger);font-size:13px}

/* Save toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);font-size:12px;padding:8px 14px;border-radius:var(--radius-sm);opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;display:flex;align-items:center;gap:6px}
.toast.show{opacity:1}

/* Responsive */
@media(max-width:640px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:1rem}
}
input[type=range]{accent-color:var(--text)}
select option{background:var(--surface);color:var(--text)}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">tracker<span>.daily</span></div>
    <div class="nav-section">Views</div>
    <button class="nav-item active" id="nav-daily" onclick="showView('daily')">
      <i class="ti ti-calendar-week"></i> Hôm nay
    </button>
    <button class="nav-item" id="nav-projects" onclick="showView('projects')">
      <i class="ti ti-list-check"></i> Dự án & deadline
    </button>
    <div class="nav-section">Nhóm</div>
    <button class="nav-item" onclick="showView('projects');filterProjects('hr')"><span style="width:8px;height:8px;border-radius:50%;background:var(--hr-dot);display:inline-block"></span> HR</button>
    <button class="nav-item" onclick="showView('projects');filterProjects('mkt')"><span style="width:8px;height:8px;border-radius:50%;background:var(--mkt-dot);display:inline-block"></span> Marketing</button>
    <button class="nav-item" onclick="showView('projects');filterProjects('lm')"><span style="width:8px;height:8px;border-radius:50%;background:var(--lm-dot);display:inline-block"></span> LM 81</button>
    <button class="nav-item" onclick="showView('projects');filterProjects('bd')"><span style="width:8px;height:8px;border-radius:50%;background:var(--bd-dot);display:inline-block"></span> BD</button>
    <div class="sidebar-bottom">
      <button class="theme-btn" onclick="toggleTheme()">
        <i class="ti ti-moon" id="theme-icon"></i> <span id="theme-label">Dark mode</span>
      </button>
    </div>
  </aside>

  <main class="main" id="main-area">
    <!-- injected by JS -->
  </main>
</div>

<!-- Task modal -->
<div class="overlay" id="task-modal">
  <div class="modal">
    <div class="modal-title" id="task-modal-title">Thêm task</div>
    <div class="form-group"><label class="form-label">Tên task</label><input type="text" id="inp-name" placeholder="Mô tả công việc..."/></div>
    <div class="form-group"><label class="form-label">Giờ bắt đầu</label><input type="time" id="inp-time" value="09:00"/></div>
    <div class="form-group"><label class="form-label">Thời lượng</label>
      <select id="inp-dur">
        <option value="0.5">30 phút</option><option value="1" selected>1 giờ</option>
        <option value="1.5">1.5 giờ</option><option value="2">2 giờ</option><option value="3">3 giờ</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Nhóm</label><div class="cat-row" id="task-cats"></div></div>
    <div class="form-group"><label class="form-label">Deadline (tuỳ chọn)</label><input type="date" id="inp-deadline"/></div>
    <div class="modal-footer">
      <button class="delete-btn" id="task-delete-btn" style="display:none" onclick="deleteTask()"><i class="ti ti-trash"></i> Xoá</button>
      <button class="btn-ghost" onclick="closeModals()">Huỷ</button>
      <button class="btn-primary" onclick="saveTask()"><i class="ti ti-check"></i> Lưu</button>
    </div>
  </div>
</div>

<!-- Project modal -->
<div class="overlay" id="proj-modal">
  <div class="modal">
    <div class="modal-title" id="proj-modal-title">Thêm dự án</div>
    <div class="form-group"><label class="form-label">Tên dự án</label><input type="text" id="pinp-name" placeholder="VD: Successful Launch campaign"/></div>
    <div class="form-group"><label class="form-label">Ghi chú / mục tiêu</label><textarea id="pinp-desc" placeholder="Mô tả ngắn..."></textarea></div>
    <div class="form-group"><label class="form-label">Nhóm</label><div class="cat-row" id="proj-cats"></div></div>
    <div class="form-group"><label class="form-label">Deadline</label><input type="date" id="pinp-deadline"/></div>
    <div class="form-group"><label class="form-label">Tiến độ</label>
      <div class="prog-row"><input type="range" id="pinp-prog" min="0" max="100" step="5" value="0" oninput="document.getElementById('prog-out').textContent=this.value+'%'"/><span class="prog-val" id="prog-out">0%</span></div>
    </div>
    <div class="modal-footer">
      <button class="delete-btn" id="proj-delete-btn" style="display:none" onclick="deleteProject()"><i class="ti ti-trash"></i> Xoá</button>
      <button class="btn-ghost" onclick="closeModals()">Huỷ</button>
      <button class="btn-primary" onclick="saveProject()"><i class="ti ti-check"></i> Lưu</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i> Đã lưu</div>

<script>
const CATS=[
  {id:'hr',label:'HR',bg:'var(--hr-bg)',txt:'var(--hr-txt)',dot:'var(--hr-dot)'},
  {id:'mkt',label:'Marketing',bg:'var(--mkt-bg)',txt:'var(--mkt-txt)',dot:'var(--mkt-dot)'},
  {id:'lm',label:'LM 81',bg:'var(--lm-bg)',txt:'var(--lm-txt)',dot:'var(--lm-dot)'},
  {id:'bd',label:'BD',bg:'var(--bd-bg)',txt:'var(--bd-txt)',dot:'var(--bd-dot)'},
];
const DAYS=['CN','T2','T3','T4','T5','T6','T7'];
const MONTHS=['tháng 1','tháng 2','tháng 3','tháng 4','tháng 5','tháng 6','tháng 7','tháng 8','tháng 9','tháng 10','tháng 11','tháng 12'];

let state={tasks:{},projects:[]};
let currentView='daily';
let currentDate=new Date();
let taskSelCat='mkt',projSelCat='mkt';
let taskEditId=null,projEditId=null;
let projFilter='all';

function loadState(){
  try{const s=localStorage.getItem('tracker_v3');if(s)state=JSON.parse(s);}catch(e){}
  if(!state.tasks)state.tasks={};
  if(!state.projects)state.projects=[];
  const k=dayKey(currentDate);
  if(!state.tasks[k])state.tasks[k]=getDefaults();
}

function saveState(){
  try{localStorage.setItem('tracker_v3',JSON.stringify(state));}catch(e){}
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),1800);
}

function getDefaults(){
  return[
    {id:'d1',name:'MKT report sáng',time:'08:00',dur:2,cat:'mkt',done:false,deadline:''},
    {id:'d2',name:'MKT report trưa',time:'12:00',dur:2,cat:'mkt',done:false,deadline:''},
    {id:'d3',name:'HR — tuyển dụng',time:'10:00',dur:1,cat:'hr',done:false,deadline:''},
    {id:'d4',name:'LM 81 — thiết kế menu',time:'14:00',dur:1.5,cat:'lm',done:false,deadline:''},
  ];
}

function dayKey(d){return d.toISOString().slice(0,10)}
function fmtDate(d){return DAYS[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear()}
function toMins(t){const[h,m]=t.split(':').map(Number);return h*60+m}

function dlLabel(dl){
  if(!dl)return null;
  const now=new Date();now.setHours(0,0,0,0);
  const d=new Date(dl+'T00:00:00');
  const diff=Math.round((d-now)/86400000);
  if(diff<0)return{cls:'dl-over',txt:'Quá hạn '+Math.abs(diff)+'n'};
  if(diff===0)return{cls:'dl-soon',txt:'Hôm nay'};
  if(diff<=3)return{cls:'dl-soon',txt:'Còn '+diff+'n'};
  if(diff<=14)return{cls:'dl-ok',txt:'Còn '+diff+'n'};
  return{cls:'dl-ok',txt:'Còn ~'+Math.round(diff/7)+'t'};
}

function showView(v){
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const ni=document.getElementById('nav-'+v);
  if(ni)ni.classList.add('active');
  render();
}

function render(){
  if(currentView==='daily')renderDaily();
  else renderProjects();
}

function renderDaily(){
  const k=dayKey(currentDate);
  const list=(state.tasks[k]||[]).slice().sort((a,b)=>toMins(a.time)-toMins(b.time));
  const done=list.filter(t=>t.done).length;
  const hrs=list.reduce((s,t)=>s+t.dur,0);
  const fmtHrs=hrs%1===0?hrs+'h':hrs.toFixed(1)+'h';

  const legendHtml=CATS.map(c=>`<div class="leg"><div class="leg-dot" style="background:${c.dot}"></div>${c.label}</div>`).join('');

  let slotsHtml='';
  const PERIODS=[{l:'Sáng',f:0,t:719},{l:'Trưa & chiều',f:720,t:1049},{l:'Tối',f:1050,t:1440}];
  let used=new Set();
  PERIODS.forEach(p=>{
    const items=list.filter(t=>{const m=toMins(t.time);return m>=p.f&&m<p.t});
    if(!items.length)return;
    slotsHtml+=`<div class="period-label">${p.l}</div>`;
    items.forEach(t=>{used.add(t.id);slotsHtml+=slotHtml(t,k)});
    slotsHtml+=`<hr class="sep"/>`;
  });
  list.filter(t=>!used.has(t.id)).forEach(t=>{slotsHtml+=slotHtml(t,k)});
  if(!list.length)slotsHtml=`<div class="empty"><i class="ti ti-coffee"></i>Ngày trống — thêm task đầu tiên!</div>`;

  document.getElementById('main-area').innerHTML=`
    <div class="page-header">
      <div class="page-title">Hôm nay</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="date-nav">
          <button class="btn-icon" onclick="changeDay(-1)"><i class="ti ti-chevron-left"></i></button>
          <span class="date-label">${fmtDate(currentDate)}</span>
          <button class="btn-icon" onclick="changeDay(1)"><i class="ti ti-chevron-right"></i></button>
        </div>
        <button class="btn-primary" onclick="openTaskModal(null)"><i class="ti ti-plus"></i> Thêm task</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${done}/${list.length}</div><div class="stat-lbl">Hoàn thành</div></div>
      <div class="stat-card"><div class="stat-num">${fmtHrs}</div><div class="stat-lbl">Kế hoạch</div></div>
      <div class="stat-card"><div class="stat-num">${list.length>0?Math.round(done/list.length*100):0}%</div><div class="stat-lbl">Tiến độ</div></div>
    </div>
    <div class="legend">${legendHtml}</div>
    <div id="slots-wrap">${slotsHtml}</div>
  `;
}

function slotHtml(task,k){
  const cat=CATS.find(c=>c.id===task.cat)||CATS[0];
  const dl=task.deadline?dlLabel(task.deadline):null;
  const dur=task.dur%1===0?task.dur+'h':task.dur.toFixed(1)+'h';
  return `<div class="time-row">
    <div class="time-col">${task.time}</div>
    <div class="slot${task.done?' slot-done':''}" style="background:${cat.bg};border-color:${cat.dot}44">
      <button class="btn-icon" style="border:none;background:none;width:24px;height:24px;flex-shrink:0;color:${task.done?'var(--ok)':'var(--text3)'}" onclick="toggleDone('${k}','${task.id}')">
        <i class="ti ti-${task.done?'circle-check':'circle'}"></i>
      </button>
      <span class="slot-name" style="color:${cat.txt}">${task.name}</span>
      <span class="pill" style="background:${cat.dot}22;color:${cat.txt}">${cat.label}</span>
      ${dl?`<span class="pill ${dl.cls}">${dl.txt}</span>`:''}
      <span class="dur-label" style="color:${cat.txt}">${dur}</span>
      <button class="btn-icon" style="border:none;background:none;width:24px;height:24px;flex-shrink:0;color:var(--text3)" onclick="openTaskModal('${task.id}','${k}')"><i class="ti ti-pencil"></i></button>
    </div>
  </div>`;
}

function changeDay(n){
  currentDate=new Date(currentDate);
  currentDate.setDate(currentDate.getDate()+n);
  const k=dayKey(currentDate);
  if(!state.tasks[k])state.tasks[k]=[];
  render();
}

function toggleDone(k,id){
  const t=(state.tasks[k]||[]).find(t=>t.id===id);
  if(t){t.done=!t.done;saveState();render()}
}

function renderProjects(){
  let projs=state.projects||[];
  if(projFilter!=='all')projs=projs.filter(p=>p.cat===projFilter);
  projs=projs.slice().sort((a,b)=>{
    if(!a.deadline&&!b.deadline)return 0;
    if(!a.deadline)return 1;if(!b.deadline)return -1;
    return a.deadline.localeCompare(b.deadline);
  });

  const filterBtns=['all','hr','mkt','lm','bd'].map(f=>`<button class="filter-btn${projFilter===f?' active':''}" onclick="filterProjects('${f}')">${f==='all'?'Tất cả':CATS.find(c=>c.id===f)?.label}</button>`).join('');

  let projsHtml='';
  if(!projs.length){
    projsHtml=`<div class="empty"><i class="ti ti-inbox"></i>Chưa có dự án nào${projFilter!=='all'?' trong nhóm này':''}</div>`;
  } else {
    projsHtml=projs.map(p=>{
      const cat=CATS.find(c=>c.id===p.cat)||CATS[0];
      const dl=p.deadline?dlLabel(p.deadline):null;
      const prog=Math.round(p.progress||0);
      return `<div class="proj-card" style="border-left:3px solid ${cat.dot};border-radius:0 var(--radius) var(--radius) 0">
        <div class="proj-top">
          <div class="proj-info">
            <div class="proj-name">${p.name}</div>
            ${p.desc?`<div class="proj-desc">${p.desc}</div>`:''}
          </div>
          <span class="pill" style="background:${cat.dot}22;color:${cat.txt}">${cat.label}</span>
        </div>
        <div class="proj-bar"><div class="proj-fill" style="width:${prog}%;background:${cat.dot}"></div></div>
        <div class="proj-foot">
          <div class="proj-meta">
            <span>${prog}% hoàn thành</span>
            ${dl?`<span class="pill ${dl.cls}">${dl.txt}</span>`:''}
            ${p.deadline?`<span style="color:var(--text3);font-size:11px">${p.deadline}</span>`:''}
          </div>
          <div class="proj-actions">
            <button class="btn-icon" onclick="openProjModal('${p.id}')" title="sửa"><i class="ti ti-pencil"></i></button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('main-area').innerHTML=`
    <div class="page-header">
      <div class="page-title">Dự án & deadline</div>
      <button class="btn-primary" onclick="openProjModal(null)"><i class="ti ti-plus"></i> Thêm dự án</button>
    </div>
    <div class="filter-row">${filterBtns}</div>
    <div class="proj-list">${projsHtml}</div>
  `;
}

function filterProjects(f){projFilter=f;if(currentView!=='projects')showView('projects');else render()}

function openTaskModal(id,k){
  taskEditId=id||null;
  const task=id?(state.tasks[k||dayKey(currentDate)]||[]).find(t=>t.id===id):null;
  document.getElementById('task-modal-title').textContent=id?'Sửa task':'Thêm task';
  document.getElementById('inp-name').value=task?task.name:'';
  document.getElementById('inp-time').value=task?task.time:'09:00';
  document.getElementById('inp-dur').value=task?task.dur:'1';
  document.getElementById('inp-deadline').value=task&&task.deadline?task.deadline:'';
  taskSelCat=task?task.cat:'mkt';
  document.getElementById('task-delete-btn').style.display=id?'block':'none';
  renderCatBtns('task-cats',taskSelCat,c=>{taskSelCat=c;renderCatBtns('task-cats',taskSelCat,arguments.callee)});
  document.getElementById('task-modal').classList.add('open');
  setTimeout(()=>document.getElementById('inp-name').focus(),50);
}

function saveTask(){
  const name=document.getElementById('inp-name').value.trim();
  if(!name){document.getElementById('inp-name').focus();return}
  const k=dayKey(currentDate);
  if(!state.tasks[k])state.tasks[k]=[];
  if(taskEditId){
    const t=state.tasks[k].find(t=>t.id===taskEditId);
    if(t){t.name=name;t.time=document.getElementById('inp-time').value;t.dur=parseFloat(document.getElementById('inp-dur').value);t.cat=taskSelCat;t.deadline=document.getElementById('inp-deadline').value}
  }else{
    state.tasks[k].push({id:'t'+Date.now(),name,time:document.getElementById('inp-time').value,dur:parseFloat(document.getElementById('inp-dur').value),cat:taskSelCat,done:false,deadline:document.getElementById('inp-deadline').value});
  }
  saveState();closeModals();render();
}

function deleteTask(){
  if(!taskEditId)return;
  const k=dayKey(currentDate);
  state.tasks[k]=(state.tasks[k]||[]).filter(t=>t.id!==taskEditId);
  saveState();closeModals();render();
}

function openProjModal(id){
  projEditId=id||null;
  const p=id?(state.projects||[]).find(p=>p.id===id):null;
  document.getElementById('proj-modal-title').textContent=id?'Sửa dự án':'Thêm dự án';
  document.getElementById('pinp-name').value=p?p.name:'';
  document.getElementById('pinp-desc').value=p?p.desc:'';
  document.getElementById('pinp-deadline').value=p&&p.deadline?p.deadline:'';
  const prog=p?Math.round(p.progress||0):0;
  document.getElementById('pinp-prog').value=prog;
  document.getElementById('prog-out').textContent=prog+'%';
  projSelCat=p?p.cat:'mkt';
  document.getElementById('proj-delete-btn').style.display=id?'block':'none';
  renderCatBtns('proj-cats',projSelCat,c=>{projSelCat=c;renderCatBtns('proj-cats',projSelCat,arguments.callee)});
  document.getElementById('proj-modal').classList.add('open');
  setTimeout(()=>document.getElementById('pinp-name').focus(),50);
}

function saveProject(){
  const name=document.getElementById('pinp-name').value.trim();
  if(!name){document.getElementById('pinp-name').focus();return}
  if(!state.projects)state.projects=[];
  const prog=parseInt(document.getElementById('pinp-prog').value)||0;
  if(projEditId){
    const p=state.projects.find(p=>p.id===projEditId);
    if(p){p.name=name;p.desc=document.getElementById('pinp-desc').value;p.cat=projSelCat;p.deadline=document.getElementById('pinp-deadline').value;p.progress=prog}
  }else{
    state.projects.push({id:'p'+Date.now(),name,desc:document.getElementById('pinp-desc').value,cat:projSelCat,deadline:document.getElementById('pinp-deadline').value,progress:prog});
  }
  saveState();closeModals();render();
}

function deleteProject(){
  if(!projEditId)return;
  state.projects=(state.projects||[]).filter(p=>p.id!==projEditId);
  saveState();closeModals();render();
}

function renderCatBtns(containerId,sel,onPick){
  const c=document.getElementById(containerId);c.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='cat-opt'+(sel===cat.id?' sel':'');
    b.style.color=cat.dot;
    b.style.background=sel===cat.id?cat.bg:'var(--surface2)';
    b.style.borderColor=sel===cat.id?cat.dot:'transparent';
    b.textContent=cat.label;
    b.onclick=()=>onPick(cat.id);
    c.appendChild(b);
  });
}

function closeModals(){
  document.querySelectorAll('.overlay').forEach(m=>m.classList.remove('open'));
}

function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'':'dark');
  document.getElementById('theme-icon').className=isDark?'ti ti-moon':'ti ti-sun';
  document.getElementById('theme-label').textContent=isDark?'Dark mode':'Light mode';
  localStorage.setItem('theme',isDark?'light':'dark');
}

document.querySelectorAll('.overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModals()}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals()});

// Init
const savedTheme=localStorage.getItem('theme')||'light';
if(savedTheme==='dark'){
  document.documentElement.setAttribute('data-theme','dark');
  document.getElementById('theme-icon').className='ti ti-sun';
  document.getElementById('theme-label').textContent='Light mode';
}
loadState();
render();
</script>
</body>
</html>
